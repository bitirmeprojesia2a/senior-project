# Existing-infra overlay for finance specialist-agent services.
#
# This keeps the finance department orchestrator as the public finance A2A
# service, while letting it call tuition/scholarship specialists over HTTP A2A.

x-a2a-model-cache-env: &a2a-model-cache-env
  MODEL_CACHE_HOST_DIR: /models
  HF_HOME: /models/huggingface
  SENTENCE_TRANSFORMERS_HOME: /models/huggingface/hub
  A2A_TRANSPORT_PROTOCOL: ${A2A_TRANSPORT_PROTOCOL:-jsonrpc}
  A2A_REQUIRE_SERVICE_IDENTITY: ${A2A_REQUIRE_SERVICE_IDENTITY:-true}
  A2A_REQUIRE_REQUEST_SIGNATURE: ${A2A_REQUIRE_REQUEST_SIGNATURE:-true}
  A2A_REQUEST_SIGNATURE_SECRET: ${A2A_REQUEST_SIGNATURE_SECRET:-}
  A2A_ALLOWED_CALLER_IDS: ${A2A_ALLOWED_CALLER_IDS:-main_orchestrator,agent-student-affairs,agent-academic,agent-finance}
  A2A_DISCOVERY_AGENT_CARD_ENABLED: ${A2A_DISCOVERY_AGENT_CARD_ENABLED:-true}
  SERVER_APP_VERSION: ${APP_VERSION:-1.0.0}
  SERVER_BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  SERVER_BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  SERVER_GIT_SHA: ${A2A_GIT_SHA:-unknown}
  SERVER_IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}
  RETRIEVAL_SERVICE_ENABLED: ${RETRIEVAL_SERVICE_ENABLED:-true}
  RETRIEVAL_SERVICE_URL: ${RETRIEVAL_SERVICE_URL:-http://retrieval-service:8140}
  RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL: ${RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL:-false}

x-a2a-model-cache-volumes: &a2a-model-cache-volumes
  - ${MODEL_CACHE_HOST_DIR:-./data/models}:/models

services:
  agent-finance:
    environment:
      A2A_SPECIALIST_MODE: http
      # Current image uses A2A_TIMEOUT_SECONDS for specialist HTTP calls; the
      # dedicated specialist timeout is used by the updated code path.
      A2A_TIMEOUT_SECONDS: ${A2A_SPECIALIST_TIMEOUT_SECONDS:-60}
      A2A_SPECIALIST_TIMEOUT_SECONDS: ${A2A_SPECIALIST_TIMEOUT_SECONDS:-60}
      A2A_SPECIALIST_ENDPOINTS: tuition_agent=http://agent-finance-tuition:8110,scholarship_agent=http://agent-finance-scholarship:8111
    depends_on:
      agent-finance-tuition:
        condition: service_healthy
      agent-finance-scholarship:
        condition: service_healthy

  agent-finance-tuition:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_finance_tuition
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8110
      SERVER_RUNTIME_LABEL: agent-finance-tuition
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: finance
      AGENT_SPECIALIST_ID: tuition_agent
      AGENT_SERVICE_ID: agent-finance-tuition
      AGENT_PUBLIC_URL: http://agent-finance-tuition:8110
    ports:
      - "${A2A_FINANCE_TUITION_PORT:-8110}:8110"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-finance-tuition
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8110/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-finance-scholarship:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_finance_scholarship
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8111
      SERVER_RUNTIME_LABEL: agent-finance-scholarship
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: finance
      AGENT_SPECIALIST_ID: scholarship_agent
      AGENT_SERVICE_ID: agent-finance-scholarship
      AGENT_PUBLIC_URL: http://agent-finance-scholarship:8111
    ports:
      - "${A2A_FINANCE_SCHOLARSHIP_PORT:-8111}:8111"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-finance-scholarship
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8111/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: ["python", "-m", "scripts.run_agent_service"]

networks:
  a2a_infra:
    external: true
    name: ${A2A_INFRA_NETWORK:-v2_default}
