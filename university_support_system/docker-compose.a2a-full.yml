# Full A2A rollout overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.a2a.yml -f docker-compose.a2a-full.yml up --build
#
# Start with docker-compose.a2a.yml first. Use this overlay only after the
# finance canary is stable, because academic_programs can load heavier RAG models.

x-a2a-model-cache-env: &a2a-model-cache-env
  HF_HOME: /models/huggingface
  SENTENCE_TRANSFORMERS_HOME: /models/huggingface/hub
  A2A_TRANSPORT_PROTOCOL: ${A2A_TRANSPORT_PROTOCOL:-rest}
  A2A_REQUIRE_SERVICE_IDENTITY: ${A2A_REQUIRE_SERVICE_IDENTITY:-true}
  A2A_REQUIRE_REQUEST_SIGNATURE: ${A2A_REQUIRE_REQUEST_SIGNATURE:-true}
  A2A_REQUEST_SIGNATURE_SECRET: ${A2A_REQUEST_SIGNATURE_SECRET:-}
  A2A_ALLOWED_CALLER_IDS: ${A2A_ALLOWED_CALLER_IDS:-main_orchestrator,agent-student-affairs,agent-academic,agent-finance}
  A2A_DISCOVERY_AGENT_CARD_ENABLED: ${A2A_DISCOVERY_AGENT_CARD_ENABLED:-true}
  SERVER_APP_VERSION: ${APP_VERSION:-1.0.0}
  SERVER_BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  SERVER_BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  SERVER_GIT_SHA: ${A2A_GIT_SHA:-unknown}
  SERVER_IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}

x-a2a-build-args: &a2a-build-args
  BASE_IMAGE: ${A2A_BASE_IMAGE:-python:3.11-slim}
  APP_VERSION: ${APP_VERSION:-1.0.0}
  BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  GIT_SHA: ${A2A_GIT_SHA:-unknown}
  IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}
  INSTALL_BUILD_TOOLS: ${A2A_INSTALL_BUILD_TOOLS:-false}
  TORCH_VARIANT: ${A2A_TORCH_VARIANT:-cpu}

x-a2a-model-cache-volumes: &a2a-model-cache-volumes
  - ${MODEL_CACHE_HOST_DIR:-./data/models}:/models

services:
  api:
    environment:
      A2A_STUDENT_AFFAIRS_URL: http://agent-student-affairs:8101
      A2A_ACADEMIC_PROGRAMS_URL: http://agent-academic:8102
      A2A_FINANCE_URL: http://agent-finance:8103
      A2A_ANNOUNCEMENT_URL: http://agent-announcement:8104
      A2A_EVENT_URL: http://agent-event:8105
    depends_on:
      agent-student-affairs:
        condition: service_healthy
      agent-academic:
        condition: service_healthy
      agent-finance:
        condition: service_healthy
      agent-announcement:
        condition: service_healthy
      agent-event:
        condition: service_healthy

  agent-student-affairs:
    image: university_support_system-app:latest
    container_name: uni_agent_student_affairs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8101
      SERVER_RUNTIME_LABEL: agent-student-affairs
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: student_affairs
      AGENT_SERVICE_ID: agent-student-affairs
      AGENT_PUBLIC_URL: http://agent-student-affairs:8101
    ports:
      - "${A2A_STUDENT_AFFAIRS_PORT:-8101}:8101"
    volumes: *a2a-model-cache-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-academic:
    image: university_support_system-app:latest
    container_name: uni_agent_academic
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8102
      SERVER_RUNTIME_LABEL: agent-academic
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: academic_programs
      AGENT_SERVICE_ID: agent-academic
      AGENT_PUBLIC_URL: http://agent-academic:8102
    ports:
      - "${A2A_ACADEMIC_PROGRAMS_PORT:-8102}:8102"
    volumes: *a2a-model-cache-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-announcement:
    image: university_support_system-app:latest
    container_name: uni_agent_announcement
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8104
      SERVER_RUNTIME_LABEL: agent-announcement
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: announcement
      AGENT_SERVICE_ID: agent-announcement
      AGENT_PUBLIC_URL: http://agent-announcement:8104
    ports:
      - "${A2A_ANNOUNCEMENT_PORT:-8104}:8104"
    volumes: *a2a-model-cache-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-event:
    image: university_support_system-app:latest
    container_name: uni_agent_event
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8105
      SERVER_RUNTIME_LABEL: agent-event
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: event
      AGENT_SERVICE_ID: agent-event
      AGENT_PUBLIC_URL: http://agent-event:8105
    ports:
      - "${A2A_EVENT_PORT:-8105}:8105"
    volumes: *a2a-model-cache-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
