# Existing-infra overlay for academic programs specialist-agent services.
#
# This keeps the academic programs department orchestrator as the public
# department A2A service, while letting it call its specialists over HTTP A2A.

x-a2a-model-cache-env: &a2a-model-cache-env
  HF_HOME: /models/huggingface
  SENTENCE_TRANSFORMERS_HOME: /models/huggingface/hub
  A2A_TRANSPORT_PROTOCOL: ${A2A_TRANSPORT_PROTOCOL:-rest}
  A2A_REQUIRE_SERVICE_IDENTITY: ${A2A_REQUIRE_SERVICE_IDENTITY:-true}
  A2A_REQUIRE_REQUEST_SIGNATURE: ${A2A_REQUIRE_REQUEST_SIGNATURE:-true}
  A2A_REQUEST_SIGNATURE_SECRET: ${A2A_REQUEST_SIGNATURE_SECRET:-}
  A2A_ALLOWED_CALLER_IDS: ${A2A_ALLOWED_CALLER_IDS:-main_orchestrator,agent-student-affairs,agent-academic,agent-finance}
  A2A_DISCOVERY_AGENT_CARD_ENABLED: ${A2A_DISCOVERY_AGENT_CARD_ENABLED:-true}
  SERVER_APP_VERSION: ${APP_VERSION:-1.0.0}
  SERVER_BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  SERVER_BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  SERVER_GIT_SHA: ${A2A_GIT_SHA:-unknown}
  SERVER_IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}
  RETRIEVAL_SERVICE_ENABLED: ${RETRIEVAL_SERVICE_ENABLED:-true}
  RETRIEVAL_SERVICE_URL: ${RETRIEVAL_SERVICE_URL:-http://retrieval-service:8140}
  RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL: ${RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL:-false}

x-a2a-model-cache-volumes: &a2a-model-cache-volumes
  - ${MODEL_CACHE_HOST_DIR:-./data/models}:/models

services:
  agent-academic:
    environment:
      A2A_SPECIALIST_MODE: http
      A2A_TIMEOUT_SECONDS: ${A2A_SPECIALIST_TIMEOUT_SECONDS:-60}
      A2A_SPECIALIST_TIMEOUT_SECONDS: ${A2A_SPECIALIST_TIMEOUT_SECONDS:-60}
      A2A_SPECIALIST_ENDPOINTS: curriculum_agent=http://agent-academic-curriculum:8130,regulation_agent=http://agent-academic-regulation:8131,international_agent=http://agent-academic-international:8132
    depends_on:
      agent-academic-curriculum:
        condition: service_healthy
      agent-academic-regulation:
        condition: service_healthy
      agent-academic-international:
        condition: service_healthy

  agent-academic-curriculum:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_academic_curriculum
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8130
      SERVER_RUNTIME_LABEL: agent-academic-curriculum
      SERVER_WARMUP_ENABLED: "true"
      SERVER_WARMUP_INCLUDE_RERANKER: "true"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: academic_programs
      AGENT_SPECIALIST_ID: curriculum_agent
      AGENT_SERVICE_ID: agent-academic-curriculum
      AGENT_PUBLIC_URL: http://agent-academic-curriculum:8130
    ports:
      - "${A2A_ACADEMIC_CURRICULUM_PORT:-8130}:8130"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-academic-curriculum
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8130/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-academic-regulation:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_academic_regulation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8131
      SERVER_RUNTIME_LABEL: agent-academic-regulation
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: academic_programs
      AGENT_SPECIALIST_ID: regulation_agent
      AGENT_SERVICE_ID: agent-academic-regulation
      AGENT_PUBLIC_URL: http://agent-academic-regulation:8131
    ports:
      - "${A2A_ACADEMIC_REGULATION_PORT:-8131}:8131"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-academic-regulation
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8131/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    command: ["python", "-m", "scripts.run_agent_service"]

  agent-academic-international:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_academic_international
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8132
      SERVER_RUNTIME_LABEL: agent-academic-international
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: academic_programs
      AGENT_SPECIALIST_ID: international_agent
      AGENT_SERVICE_ID: agent-academic-international
      AGENT_PUBLIC_URL: http://agent-academic-international:8132
    ports:
      - "${A2A_ACADEMIC_INTERNATIONAL_PORT:-8132}:8132"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-academic-international
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8132/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    command: ["python", "-m", "scripts.run_agent_service"]

networks:
  a2a_infra:
    external: true
    name: ${A2A_INFRA_NETWORK:-v2_default}
