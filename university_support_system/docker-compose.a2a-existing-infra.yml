# A2A canary using an already running infrastructure compose project.
#
# This is useful when postgres/redis/chromadb are already running in another
# compose project, e.g. the existing `v2_default` network seen in local dev.
#
# Usage:
#   docker compose -f docker-compose.a2a-existing-infra.yml up --no-build -d
#
# Override A2A_INFRA_NETWORK if your infra network name is different.

x-a2a-model-cache-env: &a2a-model-cache-env
  HF_HOME: /models/huggingface
  SENTENCE_TRANSFORMERS_HOME: /models/huggingface/hub
  A2A_TRANSPORT_PROTOCOL: ${A2A_TRANSPORT_PROTOCOL:-rest}
  A2A_REQUIRE_SERVICE_IDENTITY: ${A2A_REQUIRE_SERVICE_IDENTITY:-true}
  A2A_REQUIRE_REQUEST_SIGNATURE: ${A2A_REQUIRE_REQUEST_SIGNATURE:-true}
  A2A_REQUEST_SIGNATURE_SECRET: ${A2A_REQUEST_SIGNATURE_SECRET:-}
  A2A_ALLOWED_CALLER_IDS: ${A2A_ALLOWED_CALLER_IDS:-main_orchestrator,agent-student-affairs,agent-academic,agent-finance}
  A2A_DISCOVERY_AGENT_CARD_ENABLED: ${A2A_DISCOVERY_AGENT_CARD_ENABLED:-true}
  SERVER_APP_VERSION: ${APP_VERSION:-1.0.0}
  SERVER_BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  SERVER_BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  SERVER_GIT_SHA: ${A2A_GIT_SHA:-unknown}
  SERVER_IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}
  RETRIEVAL_SERVICE_ENABLED: ${RETRIEVAL_SERVICE_ENABLED:-true}
  RETRIEVAL_SERVICE_URL: ${RETRIEVAL_SERVICE_URL:-http://retrieval-service:8140}
  RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL: ${RETRIEVAL_SERVICE_FALLBACK_TO_LOCAL:-false}
  LLM_QUERY_NORMALIZATION_ENABLED: ${LLM_QUERY_NORMALIZATION_ENABLED:-true}

x-a2a-build-args: &a2a-build-args
  BASE_IMAGE: ${A2A_BASE_IMAGE:-python:3.11-slim}
  APP_VERSION: ${APP_VERSION:-1.0.0}
  BUILD_ID: ${A2A_BUILD_ID:-local-dev}
  BUILD_TIMESTAMP: ${A2A_BUILD_TIMESTAMP:-unknown}
  GIT_SHA: ${A2A_GIT_SHA:-unknown}
  IMAGE_REF: ${A2A_IMAGE_REF:-university_support_system-app:latest}
  INSTALL_BUILD_TOOLS: ${A2A_INSTALL_BUILD_TOOLS:-false}
  TORCH_VARIANT: ${A2A_TORCH_VARIANT:-cpu}

x-a2a-model-cache-volumes: &a2a-model-cache-volumes
  - ${MODEL_CACHE_HOST_DIR:-./data/models}:/models

services:
  retrieval-service:
    image: university_support_system-app:latest
    container_name: uni_a2a_retrieval_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8140
      SERVER_RUNTIME_LABEL: retrieval-service
      SERVER_WARMUP_ENABLED: "true"
      SERVER_WARMUP_INCLUDE_RERANKER: "true"
      SERVER_WARMUP_LLM_ENABLED: "false"
      SERVER_WARMUP_COLLECTIONS: student_affairs_docs,academic_programs_docs,academic_schedules_docs
      RETRIEVAL_SERVICE_ENABLED: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
    ports:
      - "${RETRIEVAL_SERVICE_PORT:-8140}:8140"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - retrieval-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8140/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    command: ["python", "-m", "scripts.run_retrieval_service"]

  api:
    image: university_support_system-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args: *a2a-build-args
    container_name: uni_a2a_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      SERVER_RUNTIME_LABEL: api-a2a-http
      SERVER_WARMUP_ENABLED: "true"
      SERVER_WARMUP_INCLUDE_RERANKER: "true"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_MODE: http
      A2A_TIMEOUT_SECONDS: ${A2A_CANARY_TIMEOUT_SECONDS:-30}
      A2A_DEPARTMENT_TIMEOUT_SECONDS: ${A2A_DEPARTMENT_TIMEOUT_SECONDS:-75}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_FINANCE_URL: http://agent-finance:8103
      A2A_STUDENT_AFFAIRS_URL: ${A2A_STUDENT_AFFAIRS_URL:-}
      A2A_ACADEMIC_PROGRAMS_URL: ${A2A_ACADEMIC_PROGRAMS_URL:-}
      A2A_ANNOUNCEMENT_URL: ${A2A_ANNOUNCEMENT_URL:-}
      A2A_EVENT_URL: ${A2A_EVENT_URL:-}
    ports:
      - "${A2A_API_PORT:-8000}:8000"
    volumes: *a2a-model-cache-volumes
    depends_on:
      retrieval-service:
        condition: service_healthy
      agent-finance:
        condition: service_healthy
    networks:
      - a2a_infra
    command: ["python", "-m", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  agent-finance:
    image: university_support_system-app:latest
    container_name: uni_a2a_agent_finance
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *a2a-model-cache-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8103
      SERVER_RUNTIME_LABEL: agent-finance
      SERVER_WARMUP_ENABLED: "false"
      SERVER_WARMUP_INCLUDE_RERANKER: "false"
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      SERVER_INTERNAL_API_KEY: ${SERVER_INTERNAL_API_KEY:-local-a2a-secret}
      A2A_INTERNAL_API_KEY: ${A2A_INTERNAL_API_KEY:-local-a2a-secret}
      AGENT_DEPARTMENT: finance
      AGENT_SERVICE_ID: agent-finance
      AGENT_PUBLIC_URL: http://agent-finance:8103
    ports:
      - "${A2A_FINANCE_PORT:-8103}:8103"
    volumes: *a2a-model-cache-volumes
    networks:
      a2a_infra:
        aliases:
          - agent-finance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    command: ["python", "-m", "scripts.run_agent_service"]

networks:
  a2a_infra:
    external: true
    name: ${A2A_INFRA_NETWORK:-v2_default}
